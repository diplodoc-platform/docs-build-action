name: docs-build-action
description: Build documentation

inputs:
  revision:
    default: "default_revision"
  src-root:
    default: "./"
  lint-root:
    default: "./_docs-lint"
  build-root:
    default: "./_docs-build"
  cli-version:
    default: "latest"
  use-ya-opensource:
    description: >
      If 'true', do not install @diplodoc/cli. Instead download the opensource
      `ya` bootstrap from yandex/yatool and run the build via `ya tool yfm-docs`.
    default: "false"
  pre-build-args:
    description: >
      Additional CLI arguments for an optional pre-build (md2md) step.
      If non-empty, sources will be transformed via md2md before the main build.
      Example: --config=.yfm-dltech --varsPreset=dltech --no-template-vars --no-hash-includes --remove-empty-toc-items
    default: ""

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v5
      with:
        node-version: 24

    - name: Install @diplodoc/cli
      if: inputs.use-ya-opensource != 'true'
      run: npm i @diplodoc/cli@${{ inputs.cli-version }} -g
      shell: bash

    - name: Setup ya (opensource)
      if: inputs.use-ya-opensource == 'true'
      run: |
        set -euo pipefail

        # download the ya bootstrap into the workspace root
        curl -sSL https://raw.githubusercontent.com/yandex/yatool/refs/heads/main/ya -o ya
        chmod +x ya

        # place the platform mapping config next to ya, in ./build
        wget -P build https://raw.githubusercontent.com/yandex/yatool/refs/heads/main/build/mapping.conf.json
      shell: bash

    - name: Resolve yfm command
      id: yfm-cmd
      run: |
        if [[ "${{ inputs.use-ya-opensource }}" == "true" ]]; then
          # absolute path so the command works regardless of the step's cwd
          echo "YFM_CMD=$(pwd)/ya tool yfm-docs" >> "$GITHUB_ENV"
        else
          echo "YFM_CMD=yfm" >> "$GITHUB_ENV"
        fi
      shell: bash

    - name: Pre-build md2md
      if: inputs.pre-build-args != ''
      run: |
        set +e
        set -o pipefail

        $YFM_CMD -i ${{ inputs.src-root }} -o ./_docs-prebuild --output-format md ${{ inputs.pre-build-args }} 2>&1 | tee './pre-build.log'

        exitcode=$?
        if [ "$exitcode" -ne 0 ]; then
          echo "Pre-build failed with exit code: $exitcode"
          exit $exitcode
        fi
      shell: bash

    - name: Set build source root
      id: build-src
      run: |
        if [[ -n "${{ inputs.pre-build-args }}" ]]; then
          echo "root=./_docs-prebuild" >> $GITHUB_OUTPUT
        else
          echo "root=${{ inputs.src-root }}" >> $GITHUB_OUTPUT
        fi
      shell: bash

    - name: Need pdf generation
      id: get-pdf-params
      run: |
        if [[ -e "${{ steps.build-src.outputs.root }}/.yfm" ]]; then
          need_pdf=$(yq -r '.docs-viewer.pdf // false' < ${{ steps.build-src.outputs.root }}/.yfm)
        else
          need_pdf=false
        fi

        pdf_args=''

        if [[ "$need_pdf" == 'true' ]]; then
          pdf_args='--single-page'
        fi

        echo "need_pdf=$need_pdf" >> $GITHUB_OUTPUT
        echo "pdf_args=$pdf_args" >> $GITHUB_OUTPUT
      shell: bash

    - name: Build md2html
      id: build-md2html
      run: |
        set +e
        set -o pipefail

        $YFM_CMD -i ${{ steps.build-src.outputs.root }} -o ${{ inputs.lint-root }} ${{ steps.get-pdf-params.outputs.pdf_args }} 2>&1 | tee './build-html.log'

        echo "exitcode=$?" >> $GITHUB_OUTPUT
      shell: bash
    - name: Build md2md
      id: build-md2md
      run: |
        set +e
        set -o pipefail

        $YFM_CMD -i ${{ steps.build-src.outputs.root }} -o ${{ inputs.build-root }} --output-format md --add-map-file --allow-custom-resources 2>&1 | tee './build-md.log'

        echo "exitcode=$?" >> $GITHUB_OUTPUT

      shell: bash

    - name: Run docs2pdf
      if: steps.get-pdf-params.outputs.need_pdf == 'true'
      shell: bash
      run: |
        set +e
        set -o pipefail

        sudo apt-get update
        sudo apt-get install fonts-arphic-ukai
        sudo apt-get install fonts-arphic-uming
        sudo apt-get install fonts-noto-cjk

        npx -y -- @diplodoc/pdf-generator@latest -i ${{ inputs.lint-root }}

        rsync -r --include='*.pdf' --include='*/' --exclude='*' ${{ inputs.lint-root }}/ ${{ inputs.build-root }}/

    - name: Save inputs
      run: |
        mkdir -p ./inputs
        echo ${{ inputs.revision }} > ./inputs/revision
        echo ${{ github.event.number }} > ./inputs/pr-number
      shell: bash
    - name: Upload inputs
      uses: actions/upload-artifact@v5
      with:
        name: inputs
        path: inputs/
        include-hidden-files: true
        retention-days: 1
    - name: Upload build artifacts
      uses: actions/upload-artifact@v5
      with:
        name: build-output-md
        include-hidden-files: true
        path: ${{ inputs.build-root }}
        retention-days: 1
    - name: Upload build log
      uses: actions/upload-artifact@v5
      with:
        name: build-log-html
        path: ./build-html.log
        retention-days: 1
    - name: Exit
      run: |
        exitcode=${{ steps.build-md2html.outputs.exitcode }}

        if [ "$exitcode" -eq 0 ]; then
            echo "Build exited successfully."
        else
          echo "Build exited with an error. Exit code: $exitcode"
          exit $exitcode
        fi
      shell: bash
